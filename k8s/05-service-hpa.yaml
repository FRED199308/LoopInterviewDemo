# ─── Application Service ──────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: pos-integration-service
  namespace: pos-integration
  labels:
    app: pos-integration
spec:
  selector:
    app: pos-integration
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP      # Use LoadBalancer or NodePort for external access without Ingress

---
# ─── Horizontal Pod Autoscaler ────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pos-integration-hpa
  namespace: pos-integration
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pos-integration
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
