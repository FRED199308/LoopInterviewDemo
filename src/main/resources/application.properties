# ============================================================
# Application Configuration
# ============================================================
spring.application.name=pos-integration

# ============================================================
# MySQL DataSource Configuration
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/pos_integration_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# SOAP Web Service
# ============================================================
soap.wsdl.url=http://webservices.oorsprong.org/websamples.countryinfo/CountryInfoService.wso?WSDL
soap.endpoint.url=http://webservices.oorsprong.org/websamples.countryinfo/CountryInfoService.wso

# ============================================================
# Retry Configuration
# ============================================================
soap.retry.max-attempts=3
soap.retry.backoff-delay=2000

# ============================================================
# Server
# ============================================================
server.port=${SERVER_PORT:8080}
server.error.include-message=always

# ============================================================
# Actuator / Health / Metrics
# ============================================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.info.env.enabled=true

info.app.name=NCBA POS Integration Service
info.app.version=1.0.0
info.app.description=SOAP+REST country info integration

# ============================================================
# Logging
# ============================================================
logging.level.com.ncba.pos=DEBUG
logging.level.org.springframework.ws=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/pos-integration.log
